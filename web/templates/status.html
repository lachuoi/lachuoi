<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - La Chuoi</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/static/assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/assets/favicon-16x16.png">
    <link rel="shortcut icon" href="/static/assets/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .sidebar.resizing { transition: none; }
        .sidebar-collapsed { width: 4rem !important; }
        .sidebar-expanded { width: 16rem; }
        .sidebar-resizer {
            position: absolute;
            top: 0;
            right: -2px;
            width: 4px;
            height: 100%;
            cursor: col-resize;
            z-index: 60;
            transition: background 0.2s;
        }
        .sidebar-resizer:hover, .sidebar.resizing .sidebar-resizer {
            background: rgba(59, 130, 246, 0.5);
        }
        .nav-text { transition: opacity 0.2s; overflow: hidden; }
        .sidebar-collapsed .nav-text { opacity: 0; pointer-events: none; width: 0; }
        .sidebar-collapsed .nav-item { justify-content: center; padding-left: 0; padding-right: 0; gap: 0; }
        .sidebar-collapsed .logo-text { display: none; }
        .sidebar-collapsed .sidebar-header { justify-content: center; }
        .sidebar-collapsed .sidebar-header-logo { margin-right: 0; }
        .sidebar-collapsed .sidebar-header-toggle { 
            position: absolute; 
            right: -9px; 
            top: 50%;
            transform: translateY(-50%);
            z-index: 50;
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            padding: 22px 1px;
            border-radius: 6px;
        }
        .sidebar-expanded .sidebar-header-toggle {
            position: absolute;
            right: -9px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 50;
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            padding: 22px 1px;
            border-radius: 6px;
        }
        .sidebar-header-toggle svg {
            width: 14px;
            height: 14px;
        }
        .dark .sidebar-header-toggle {
            background: #1e293b;
            border-color: #334155;
        }
        .sidebar-collapsed .user-profile-container { gap: 0; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen text-slate-900 dark:text-slate-100 transition-colors duration-300 flex">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar sidebar-expanded sticky top-0 h-screen bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col z-40">
        <div id="sidebar-resizer" class="sidebar-resizer"></div>
        <div class="sidebar-header p-4 flex items-center justify-between border-b border-slate-100 dark:border-slate-800 h-20">
            <div class="sidebar-header-logo flex items-center gap-3 overflow-hidden">
                <img src="/static/assets/favicon-32x32.png" class="w-8 h-8 rounded-lg" alt="LC">
                <span class="logo-text font-extrabold text-lg tracking-tight whitespace-nowrap">La Chuoi</span>
            </div>
            <button id="sidebar-toggle" class="sidebar-header-toggle p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
            </button>
        </div>

        <nav class="flex-1 p-3 space-y-2 overflow-y-auto overflow-x-hidden">
            <a href="/task-status" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 font-semibold transition-all group" title="Tasks Dashboard">
                <svg class="w-5 h-5 min-w-[1.25rem]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h2m3 0h2a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                <span class="nav-text whitespace-nowrap">Tasks Status</span>
            </a>
            <a href="/webhook-status" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 font-medium transition-all group" title="Webhook Monitor">
                <svg class="w-5 h-5 min-w-[1.25rem]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span class="nav-text whitespace-nowrap">Webhook Monitor</span>
            </a>
        </nav>

        <div class="p-4 border-t border-slate-100 dark:border-slate-800">
            <div class="user-profile-container flex items-center gap-3 overflow-hidden">
                {{user_avatar}}
                <div class="nav-text overflow-hidden">
                    <p class="text-sm font-bold truncate">{{user}}</p>
                    <a href="/logout" class="text-[10px] text-blue-600 dark:text-blue-400 hover:underline font-bold uppercase tracking-wider">Logout</a>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <div id="page-container" class="flex-1 min-w-0 flex flex-col transition-all duration-300">
        <!-- Header -->
        <header class="sticky top-0 z-30 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 h-20 flex items-center justify-center">
            <div id="header-container" class="w-full px-8 flex items-center justify-between transition-all duration-300">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white">Task Status</h1>
                </div>
                
                <div class="flex items-center gap-3">
                    <!-- Layout Toggle -->
                    <button id="layout-toggle" class="p-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-all text-slate-600 dark:text-slate-400" title="Toggle Layout">
                        <svg id="layout-horizontal-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                        <svg id="layout-vertical-icon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h2m3 0h2a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                    </button>

                    <!-- Theme Toggle -->
                    <button id="theme-toggle" class="p-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">
                        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5 text-slate-800" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5 text-amber-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Scrollable Area -->
        <main class="flex-1 overflow-y-auto p-8">
            <div id="main-container" class="max-w-none mx-auto flex flex-col gap-8 transition-all duration-300">
                <!-- Tasks Table -->
                <div id="tasks-section" class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800">
                                    <th class="px-4 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors group" onclick="setSort('name')">
                                        <div class="flex items-center gap-1">
                                            Name <span id="sort-name" class="opacity-0 group-hover:opacity-100 transition-opacity">↕</span>
                                        </div>
                                    </th>
                                    <th class="px-4 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors group" onclick="setSort('task_type')">
                                        <div class="flex items-center gap-1">
                                            Type <span id="sort-task_type" class="opacity-0 group-hover:opacity-100 transition-opacity">↕</span>
                                        </div>
                                    </th>
                                    <th class="px-4 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors group" onclick="setSort('cron')">
                                        <div class="flex items-center gap-1">
                                            Schedule <span id="sort-cron" class="opacity-0 group-hover:opacity-100 transition-opacity">↕</span>
                                        </div>
                                    </th>
                                    <th class="px-4 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors group" onclick="setSort('timezone')">
                                        <div class="flex items-center gap-1">
                                            Timezone <span id="sort-timezone" class="opacity-0 group-hover:opacity-100 transition-opacity">↕</span>
                                        </div>
                                    </th>
                                    <th class="px-4 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors group" onclick="setSort('last_run')">
                                        <div class="flex items-center gap-1">
                                            Last Run <span id="sort-last_run" class="opacity-0 group-hover:opacity-100 transition-opacity">↕</span>
                                        </div>
                                    </th>
                                    <th class="px-4 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors group" onclick="setSort('enabled')">
                                        <div class="flex items-center gap-1">
                                            Status <span id="sort-enabled" class="opacity-0 group-hover:opacity-100 transition-opacity">↕</span>
                                        </div>
                                    </th>
                                    <th class="px-4 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="task-table-body" class="divide-y divide-slate-100 dark:divide-slate-800">
                                {{rows}}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Logs Section -->
                <div id="logs-section" class="bg-slate-900 dark:bg-black rounded-xl shadow-2xl border border-slate-800 dark:border-slate-900 overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                        <div class="flex items-center gap-2">
                            <span class="text-slate-400 font-bold text-xs uppercase tracking-widest">Task outputs</span>
                            <span class="px-1.5 py-0.5 rounded bg-blue-500/10 text-blue-400 text-[10px] font-bold uppercase">Realtime</span>
                            <button id="show-all-logs" onclick="clearFilter()" class="hidden text-slate-500 hover:text-slate-300 text-[10px] font-bold uppercase border-l border-slate-700 pl-2 ml-1 transition-colors">Show All</button>
                        </div>
                        <span id="status-indicator" class="text-xs font-medium transition-colors duration-300">Connecting...</span>
                    </div>
                    <div id="logs" class="p-6 h-[400px] overflow-y-auto font-mono text-sm leading-relaxed scrollbar-thin scrollbar-thumb-slate-700 text-slate-300">
                        <!-- Logs will appear here -->
                    </div>
                </div>
            </div>
            
            <footer class="mt-12 pt-8 border-t border-slate-200 dark:border-slate-800 text-center text-slate-400 dark:text-slate-500 text-sm">
                &copy; 2026 Seungjin Kim. Licensed under MIT or Apache 2.0.
            </footer>
        </main>
    </div>

    <!-- Modal for execution logs -->
    <div id="log-modal" class="modal fixed inset-0 z-50 items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 w-full max-w-4xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col border border-slate-200 dark:border-slate-800">
            <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                <h3 class="text-xl font-bold">Execution Logs</h3>
                <button onclick="closeLogModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="log-modal-content" class="p-6 overflow-y-auto bg-slate-900 dark:bg-black font-mono text-sm leading-relaxed text-slate-300 min-h-[300px]">
                <!-- Logs will appear here -->
            </div>
        </div>
    </div>

    <script>
        // Close on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLogModal?.();
                if (window.closeModal) closeModal();
            }
        });

        // Close on click outside
        document.getElementById('log-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('log-modal')) closeLogModal();
        });

        // Sidebar Toggle & Resizing
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebarLogo = document.querySelector('.sidebar-header-logo');
        const resizer = document.getElementById('sidebar-resizer');
        
        // Load sidebar state
        const savedWidth = localStorage.getItem('sidebar-width');
        if (savedWidth && localStorage.getItem('sidebar-collapsed') !== 'true') {
            sidebar.style.width = savedWidth;
        }

        if (localStorage.getItem('sidebar-collapsed') === 'true') {
            sidebar.classList.remove('sidebar-expanded');
            sidebar.classList.add('sidebar-collapsed');
            sidebarToggle.querySelector('svg').style.transform = 'rotate(180deg)';
        }

        const toggleSidebar = () => {
            const isCollapsed = sidebar.classList.contains('sidebar-collapsed');
            if (isCollapsed) {
                sidebar.classList.remove('sidebar-collapsed');
                sidebar.classList.add('sidebar-expanded');
                sidebarToggle.querySelector('svg').style.transform = 'rotate(0deg)';
                localStorage.setItem('sidebar-collapsed', 'false');
                const savedWidth = localStorage.getItem('sidebar-width');
                if (savedWidth) sidebar.style.width = savedWidth;
            } else {
                sidebar.classList.remove('sidebar-expanded');
                sidebar.classList.add('sidebar-collapsed');
                sidebarToggle.querySelector('svg').style.transform = 'rotate(180deg)';
                localStorage.setItem('sidebar-collapsed', 'true');
                sidebar.style.width = ''; // Reset to CSS default for collapsed
            }
        };

        sidebarToggle.addEventListener('click', toggleSidebar);
        sidebarLogo.addEventListener('click', () => {
            if (sidebar.classList.contains('sidebar-collapsed')) {
                toggleSidebar();
            }
        });

        // Resizing Logic
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            if (sidebar.classList.contains('sidebar-collapsed')) return;
            isResizing = true;
            sidebar.classList.add('resizing');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            let newWidth = e.clientX;
            if (newWidth < 160) newWidth = 160; // Min width when expanded
            if (newWidth > 600) newWidth = 600; // Max width
            sidebar.style.width = `${newWidth}px`;
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                sidebar.classList.remove('resizing');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                localStorage.setItem('sidebar-width', sidebar.style.width);
            }
        });
    </script>
    <script src="/static/js/app.js?v=17"></script>
</body>
</html>
