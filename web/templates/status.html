<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Cron Dashboard</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class='container'>
        <header>
            <h1>Cron Task Scheduler</h1>
            <div style='display: flex; align-items: center; color: var(--text-muted); font-size: 0.875rem;'>
                <span class='dot'></span> System Online
            </div>
        </header>
        <div class='table-container'>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Schedule</th>
                        <th>Timezone</th>
                        <th>Last Run</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="task-table-body">
                    {{rows}}
                </tbody>
            </table>
        </div>

        <div class="logs-container">
            <div class="logs-header">
                Task Logs (Live)
                <span id="status-indicator" style="font-size: 0.7rem; color: var(--text-muted);">Connecting...</span>
            </div>
            <div id="logs"></div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
